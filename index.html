  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, createContext, useContext } = React;

    // --- Helper Component: SVG Icons ---
    const Icon = ({ name, className = "w-5 h-5", strokeWidth = 2 }) => {
      const paths = {

          </>
        ),
        settings: (
          <>
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
            <circle cx="12" cy="12" r="3" />
          </>
        ),
        battery: (
          <>
            <rect width="16" height="10" x="2" y="7" rx="2" ry="2" />
            <line x1="22" x2="22" y1="11" y2="13" />
          </>
        ),
        shield: (
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
        ),
        alertTriangle: (
          <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" />
        ),
        alertCircle: (
          <>
            <circle cx="12" cy="12" r="10" />
            <line x1="12" x2="12" y1="8" y2="12" />
            <line x1="12" x2="12.01" y1="16" y2="16" />
          </>
        ),
        thermometer: (
          <path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z" />
        ),
        zap: (
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
        ),
        gauge: (
          <>
            <path d="m12 14 4-4" />
            <path d="M3.34 19a10 10 0 1 1 17.32 0" />
          </>
        ),
        activity: (
          <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
        ),
        user: (
          <>
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </>
        ),
        cloud: (
          <path d="M17.5 19A4.5 4.5 0 0 0 22 14.5c0-2.3-1.6-4.3-4-4.8a6.5 6.5 0 0 0-12.7-1C3 9.5 1 11.7 1 14.5A4.5 4.5 0 0 0 5.5 19z" />
        ),
        sun: (
          <>
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
          </>
        ),
        bell: (
          <>
            <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
            <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
          </>
        ),
        award: (
          <>
            <circle cx="12" cy="8" r="7" />
            <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88" />
          </>
        ),
        checkCircle: (
          <>
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
            <polyline points="22 4 12 14.01 9 11.01" />
          </>
        ),
        chevronRight: (
          <path d="m9 18 6-6-6-6" />
        ),
        send: (
          <>
            <line x1="22" x2="11" y1="2" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </>
        ),
        mapPin: (
          <>
            <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
            <circle cx="12" cy="10" r="3" />
          </>
        ),
        info: (
          <>
            <circle cx="12" cy="12" r="10" />
            <line x1="12" x2="12" y1="16" y2="12" />
            <line x1="12" x2="12.01" y1="8" y2="8" />
          </>
        ),
        play: (
          <polygon points="5 3 19 12 5 21 5 3" />
        ),
        refreshCw: (
          <>
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
            <path d="M3 3v5h5M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
            <path d="M16 16h5v5" />
          </>
        ),
        alertOctagon: (
          <polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2" />
        )
      };

      const pathContent = paths[name] || <circle cx="12" cy="12" r="10" />;
      
      return (
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          strokeWidth={strokeWidth}
          strokeLinecap="round"
          strokeLinejoin="round"
          className={className}
        >
          {pathContent}
        </svg>
      );
    };

    // --- State Simulator Engine (React Context) ---
    const SimulationContext = createContext();

    const SimulationProvider = ({ children }) => {
      const [activeTab, setActiveTab] = useState('health');
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
      
      // Simulation States: 'normal' | 'warning' | 'critical'
      const [simMode, setSimMode] = useState('normal'); 
      const [isSimRunning, setIsSimRunning] = useState(true);
      const [simTime, setSimTime] = useState(0);

      // Selected Component in Digital Twin
      const [selectedComponent, setSelectedComponent] = useState(null);

      // Core Vehicle Data
      const [telemetry, setTelemetry] = useState({
        speed: 72,
        rpm: 2450,
        batterySoc: 87,
        batteryHealth: 98,
        engineTemp: 86,
        coolantLevel: 94,
        coolantTemp: 81,
        oilPressure: 45,
        brakeWear: 18,
        motorEfficiency: 96,
        tirePressureFL: 33,
        tirePressureFR: 33,
        tirePressureRL: 34,
        tirePressureRR: 34,
        healthScore: 96,
        riskScore: 8,
        remainingLife: 145, // in days
        repairCost: 3200 // in INR
      });

      // Telemetry Logs for custom SVG Live Charts
      const [telemetryHistory, setTelemetryHistory] = useState({
        engineTemp: Array.from({length: 15}, (_, i) => ({ val: 84 + Math.sin(i)*2, time: i })),
        coolantTemp: Array.from({length: 15}, (_, i) => ({ val: 79 + Math.sin(i)*1.5, time: i })),
        rpm: Array.from({length: 15}, (_, i) => ({ val: 2400 + Math.random()*100, time: i })),
        speed: Array.from({length: 15}, (_, i) => ({ val: 70 + Math.random()*5, time: i })),
        efficiency: Array.from({length: 15}, (_, i) => ({ val: 95 + Math.sin(i/2)*1, time: i }))
      });

      // Quick Stats
      const stats = {
        distance: 142.8,
        energyCons: 145, // Wh/km
        carbonSaved: 18.4, // kg
        tripDuration: '2h 15m',
        drivingScore: 92,
        ecoDriving: 94
      };

      // Notifications/Alerts
      const [alerts, setAlerts] = useState([
        { id: 1, type: 'info', msg: 'System Database Synchronized', time: '10 min ago', active: true },
        { id: 2, type: 'success', msg: 'Smooth braking pattern recognized. Efficiency optimized.', time: '23 min ago', active: true }
      ]);

      // Chat Messages (Co-Pilot Guide Assistant)
      const [chatMessages, setChatMessages] = useState([
        {
          sender: 'ai',
          text: "Hello. I am your PulseDrive Co-Pilot. I monitor powertrain, cooling, and battery status. Ask me anything about your Hyundai Creta EV's metrics or diagnostic logs.",
          time: '20:01'
        }
      ]);

      // Anomaly Progression Tick (Story Mode)
      useEffect(() => {
        if (!isSimRunning) return;

        const interval = setInterval(() => {
          setSimTime(prev => prev + 1);

          setTelemetry(prev => {
            let next = { ...prev };
            
            const fluctuation = (Math.random() - 0.5) * 1.5;
            next.speed = Math.max(0, Math.min(180, Math.round(next.speed + (Math.random() - 0.5) * 4)));
            next.rpm = Math.max(800, Math.min(6500, Math.round(next.rpm + (Math.random() - 0.5) * 200)));
            next.motorEfficiency = Math.max(70, Math.min(100, Math.round(96 - (next.engineTemp > 100 ? (next.engineTemp - 100)*0.5 : 0) + (Math.random()-0.5))));

            if (simMode === 'normal') {
              next.engineTemp = Math.round(85 + Math.sin(simTime / 5) * 2);
              next.coolantLevel = Math.max(90, Math.round(next.coolantLevel + (Math.random() - 0.5) * 0.2));
              next.coolantTemp = Math.round(80 + Math.sin(simTime / 5) * 1.5);
              next.oilPressure = Math.round(44 + Math.sin(simTime / 8) * 1);
              next.healthScore = 96;
              next.riskScore = 8;
              next.remainingLife = 145;
              next.repairCost = 3200;
            } 
            else if (simMode === 'warning') {
              const progressRatio = Math.min(1, (simTime % 60) / 25);
              next.coolantLevel = Math.max(55, Math.round(94 - progressRatio * 35));
              next.engineTemp = Math.round(86 + progressRatio * 16 + fluctuation);
              next.coolantTemp = Math.round(81 + progressRatio * 14);
              next.healthScore = Math.round(96 - progressRatio * 10);
              next.riskScore = Math.round(8 + progressRatio * 38);
              next.remainingLife = Math.round(145 - progressRatio * 120);
              next.repairCost = 4200;
            } 
            else if (simMode === 'critical') {
              const progressRatio = Math.min(1, (simTime % 60) / 20);
              next.coolantLevel = Math.max(8, Math.round(55 - progressRatio * 47));
              next.engineTemp = Math.round(102 + progressRatio * 18 + fluctuation);
              next.coolantTemp = Math.round(95 + progressRatio * 15);
              next.healthScore = Math.round(86 - progressRatio * 34);
              next.riskScore = Math.round(46 + progressRatio * 49);
              next.remainingLife = Math.max(0, Math.round(25 - progressRatio * 25));
              next.repairCost = 28500;
            }

            return next;
          });
        }, 1000);

        return () => clearInterval(interval);
      }, [simMode, simTime, isSimRunning]);

      // Telemetry logging for charts
      useEffect(() => {
        const interval = setInterval(() => {
          setTelemetryHistory(prev => {
            const pushData = (arr, val) => {
              const copy = [...arr];
              copy.push({ val, time: simTime });
              if (copy.length > 20) copy.shift();
              return copy;
            };
            return {
              engineTemp: pushData(prev.engineTemp, telemetry.engineTemp),
              coolantTemp: pushData(prev.coolantTemp, telemetry.coolantTemp),
              rpm: pushData(prev.rpm, telemetry.rpm),
              speed: pushData(prev.speed, telemetry.speed),
              efficiency: pushData(prev.efficiency, telemetry.motorEfficiency)
            };
          });
        }, 2000);

        return () => clearInterval(interval);
      }, [telemetry, simTime]);

      // Notification Generator depending on Simulator Phase
      useEffect(() => {
        if (simMode === 'warning') {
          if (!alerts.some(a => a.id === 100)) {
            const newAlert = {
              id: 100,
              type: 'warning',
              msg: 'Coolant fluid level dropping. Radiator efficiency degraded.',
              time: 'Just now',
              active: true
            };
            setAlerts(prev => [newAlert, ...prev]);
            
            setChatMessages(prev => [
              ...prev,
              {
                sender: 'ai',
                text: "⚠️ WARNING: A coolant system deviation is registered. The coolant fluid level has decreased to 55% with a gradual temperature increase (+0.45°C/min). Projected cooling margin warning in 18 km. Recommendation: Inspect the reservoir for leaks at your earliest convenience.",
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
              }
            ]);
          }
        } else if (simMode === 'critical') {
          if (!alerts.some(a => a.id === 200)) {
            const newAlert = {
              id: 200,
              type: 'critical',
              msg: 'Engine Temperature high: Exceeds 115°C limit.',
              time: 'Just now',
              active: true
            };
            setAlerts(prev => [newAlert, ...prev]);
            
            setChatMessages(prev => [
              ...prev,
              {
                sender: 'ai',
                text: "🚨 CRITICAL FAULT: Engine core temperature is 118°C. Coolant level is at a critical 8%. Continued operation runs the risk of physical block deformation. Please pull over safely within 3 km. A service location has been flagged 2.4 km away.",
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
              }
            ]);
          }
        } else if (simMode === 'normal') {
          setAlerts(prev => prev.filter(a => a.id !== 100 && a.id !== 200));
        }
      }, [simMode]);

      // Assistant respond engine
      const sendChatMessage = (text) => {
        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const userMsg = { sender: 'user', text, time: timestamp };
        setChatMessages(prev => [...prev, userMsg]);

        setTimeout(() => {
          let aiText = "";
          const lowerText = text.toLowerCase();
          
          if (lowerText.includes('overheating') || lowerText.includes('temperature') || lowerText.includes('coolant')) {
            if (simMode === 'normal') {
              aiText = "The cooling circuit is operating within standard thresholds. Coolant loop temperature is 81°C with fluid levels at 94%. No degradation or thermal anomalies are detected.";
            } else if (simMode === 'warning') {
              aiText = "Coolant reservoir level has dropped to 55%. Current motor core temperature is elevated at " + telemetry.engineTemp + "°C. A localized pressure leak is suspected. Remaining safe distance before thermal limit is estimated at 18 km.";
            } else {
              aiText = "CRITICAL: Current engine temperature is " + telemetry.engineTemp + "°C. Coolant fluid levels are at a critical 8%. Engine speed has been capped. Please pull over safely to prevent engine block damage.";
            }
          } 
          else if (lowerText.includes('drive') || lowerText.includes('50 km') || lowerText.includes('safe')) {
            if (simMode === 'normal') {
              aiText = "Yes, you can safely complete your drive. Battery state of charge is " + telemetry.batterySoc + "%, yielding an estimated range of " + Math.round(telemetry.batterySoc * 4.8) + " km. All system parameters are nominal.";
            } else if (simMode === 'warning') {

      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let animationFrameId;
        
        let width = (canvas.width = window.innerWidth);
        let height = (canvas.height = window.innerHeight);

        const handleResize = () => {
          if (canvas) {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
          }
        };
        window.addEventListener('resize', handleResize);

        const numParticles = 25;
        const particles = [];
        
        const getColors = () => {
          if (simMode === 'critical') return { r: 178, g: 79, b: 61 };
          if (simMode === 'warning') return { r: 179, g: 134, b: 62 };
          return { r: 217, g: 119, b: 54 };
        };

        for (let i = 0; i < numParticles; i++) {
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * 0.2,
            vy: (Math.random() - 0.5) * 0.2,
            r: Math.random() * 1.5 + 0.5
          });
        }

        const draw = () => {
          ctx.clearRect(0, 0, width, height);
          
          const colors = getColors();
          const gradient = ctx.createRadialGradient(width/2, height/2, 10, width/2, height/2, Math.max(width, height));
          gradient.addColorStop(0, `rgba(${colors.r}, ${colors.g}, ${colors.b}, 0.03)`);
          gradient.addColorStop(0.6, 'rgba(235, 241, 245, 0.15)');
          gradient.addColorStop(1, 'rgba(235, 241, 245, 1)');
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, width, height);

          particles.forEach((p, idx) => {
            p.x += p.vx;
            p.y += p.vy;

            if (p.x < 0 || p.x > width) p.vx *= -1;
            if (p.y < 0 || p.y > height) p.vy *= -1;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${colors.r}, ${colors.g}, ${colors.b}, 0.2)`;
            ctx.fill();

            for (let j = idx + 1; j < particles.length; j++) {
              const p2 = particles[j];
              const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
              if (dist < 180) {
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.strokeStyle = `rgba(${colors.r}, ${colors.g}, ${colors.b}, ${0.05 * (1 - dist/180)})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
              }
            }
          });

          animationFrameId = requestAnimationFrame(draw);
        };

        draw();

        return () => {
          cancelAnimationFrame(animationFrameId);
          window.removeEventListener('resize', handleResize);
        };
      }, [simMode]);

    const CustomTelemetryChart = ({ data, color, title, labelY }) => {
      const margin = { top: 10, right: 10, bottom: 20, left: 35 };
      const width = 450;
      const height = 150;

      if (!data || data.length === 0) return null;

      const vals = data.map(d => d.val);
      const minVal = Math.min(...vals) - 1;
      const maxVal = Math.max(...vals) + 1;
      const range = maxVal - minVal;

      const getX = (index) => margin.left + (index / (data.length - 1)) * (width - margin.left - margin.right);
      const getY = (val) => height - margin.bottom - ((val - minVal) / (range || 1)) * (height - margin.top - margin.bottom);

      const points = data.map((d, i) => `${getX(i)},${getY(d.val)}`).join(' L ');
      const linePath = `M ${points}`;
      const areaPath = `${linePath} L ${getX(data.length - 1)},${height - margin.bottom} L ${getX(0)},${height - margin.bottom} Z`;

      return (

            <span class="text-xs text-textSecondary uppercase font-mono font-semibold tracking-wider">{title}</span>

                  <stop offset="100%" stopColor={color} stopOpacity="0.0" />

              <line x1={margin.left} y1={(height - margin.top - margin.bottom)/2 + margin.top} x2={width - margin.right} y2={(height - margin.top - margin.bottom)/2 + margin.top} stroke="rgba(255,255,255,0.03)" strokeWidth="1" />
              <line x1={margin.left} y1={height - margin.bottom} x2={width - margin.right} y2={height - margin.bottom} stroke="rgba(255,255,255,0.08)" strokeWidth="1" />

              <path d={areaPath} fill={`url(#gradient-${title})`} />
              <path d={linePath} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" />

              <circle 
                cx={getX(data.length - 1)} 
                cy={getY(data[data.length - 1]?.val)}

        </div>
      );
    };

    // --- SETTINGS PAGE ---
    const SettingsPage = () => {
      const { simMode, setSimMode, isSimRunning, setIsSimRunning } = useSimulation();

      return (
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          
          <div class="lg:col-span-2 glass-panel p-6 rounded-2xl space-y-6">
            <h3 class="text-sm font-bold text-white uppercase tracking-wider font-mono">Telemetry Simulator Settings</h3>
            
            <div class="p-5 rounded-xl bg-white/5 border border-white/5 space-y-4">
              <div>
                <h4 class="text-xs font-bold text-white">Manual Anomaly Simulation</h4>
                <p class="text-[10px] text-textSecondary mt-0.5">Toggle vehicle states to demonstrate diagnostic flows and warnings</p>
              </div>

              <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 pt-2">
                <button
                  onClick={() => setSimMode('normal')}
                  class={`p-4 rounded-xl border flex flex-col justify-between text-left transition-all ${
                    simMode === 'normal' 
                      ? 'border-brandGreen/45 bg-brandGreen/5 text-brandGreen shadow-glowGreen' 
                      : 'border-white/5 hover:border-white/10 text-white'
                  }`}
                >
                  <span class="text-xs font-bold font-mono">NORMAL OPERATION</span>
                  <span class="text-[10px] text-textSecondary mt-1 leading-normal">Systems healthy. Engine core at 85°C. Risk 8%.</span>
                </button>

                <button
                  onClick={() => setSimMode('warning')}
                  class={`p-4 rounded-xl border flex flex-col justify-between text-left transition-all ${
                    simMode === 'warning' 
                      ? 'border-brandAmber/45 bg-brandAmber/5 text-brandAmber shadow-glowAmber' 
                      : 'border-white/5 hover:border-white/10 text-white'
                  }`}
                >
                  <span class="text-xs font-bold font-mono">WARNING STATE</span>
                  <span class="text-[10px] text-textSecondary mt-1 leading-normal">Coolant drops to 55%. Radiator temp rises to 102°C.</span>
                </button>

                <button
                  onClick={() => setSimMode('critical')}
                  class={`p-4 rounded-xl border flex flex-col justify-between text-left transition-all ${
                    simMode === 'critical' 
                      ? 'border-brandRed/45 bg-brandRed/5 text-brandRed shadow-glowRed' 
                      : 'border-white/5 hover:border-white/10 text-white'
                  }`}
                >
                  <span class="text-xs font-bold font-mono">CRITICAL TEMP</span>
                  <span class="text-[10px] text-textSecondary mt-1 leading-normal">Coolant drops to 8%. Motor spikes to 118°C limit.</span>
                </button>
              </div>

              <div class="flex items-center justify-between pt-4 border-t border-white/5">
                <div>
                  <h5 class="text-xs font-bold text-white">Onboard Telemetry Updates</h5>
                  <p class="text-[10px] text-textSecondary mt-0.5">Let sensor values update in real-time with slight driving vibrations</p>
                </div>
                
                <button
                  onClick={() => setIsSimRunning(!isSimRunning)}
                  class={`px-4 py-2 rounded-xl text-xs font-mono font-bold transition-all ${
                    isSimRunning ? 'bg-brandCyan text-brandDark shadow-glowCyan' : 'bg-white/10 text-white'
                  }`}
                >
                  {isSimRunning ? 'Active' : 'Paused'}
                </button>
              </div>
            </div>

            <div class="p-5 rounded-xl bg-white/5 border border-white/5 space-y-4">
              <h4 class="text-xs font-bold text-white uppercase font-mono tracking-wider">On-Board Module Information</h4>
              
              <div class="grid grid-cols-2 gap-4 text-xs font-mono">
                <div>
                  <span class="text-textSecondary block uppercase">VIN</span>
                  <span class="text-white mt-1 block">MAL3H8K2P9D81273</span>
                </div>
                <div>
                  <span class="text-textSecondary block uppercase">Model Name</span>
                  <span class="text-white mt-1 block">Hyundai Creta EV 2026</span>
                </div>
                <div>
                  <span class="text-textSecondary block uppercase">Software Version</span>
                  <span class="text-white mt-1 block">PD-OS-10.2.14-RELEASE</span>
                </div>
                <div>
                  <span class="text-textSecondary block uppercase">Hardware Connection</span>
                  <span class="text-brandGreen font-bold mt-1 block">CAN-BUS Active</span>
                </div>
              </div>
            </div>
          </div>

          <div class="lg:col-span-1 space-y-6">
            <div class="glass-panel p-6 rounded-2xl space-y-4">
              <h4 class="text-xs font-bold text-white uppercase font-mono tracking-wider">Demonstration Script Guide</h4>
              <p class="text-xs text-textSecondary leading-relaxed">
                To demonstrate <strong>PulseDrive</strong> features:
              </p>
              <ol class="text-xs text-textSecondary space-y-2 list-decimal pl-4 leading-normal">
                <li>Load dashboard under <strong>Normal Operation</strong> (shows 96% health and green widgets).</li>
                <li>Go to <strong>Digital Twin</strong> or <strong>Co-Pilot Guide</strong> tab.</li>
                <li>Click <strong>Warning State</strong> in top bar or Settings. Observe temperature climb and warning alert slide in.</li>
                <li>Switch to <strong>Critical Temp</strong>. Observe the dashboard turn red, emergency navigation banner appearing, and Co-Pilot recommendation in the chat module.</li>
              </ol>
            </div>
          </div>

        </div>
      );
    };

    // --- Main Layout Container ---
    const MainLayout = () => {
      const { activeTab, simMode } = useSimulation();

      return (
        <div class="relative flex min-h-screen overflow-hidden z-10">
          <CanvasBackground />

          <Sidebar />

          <div class="flex-1 flex flex-col overflow-y-auto px-4 pb-8 space-y-4 h-screen">
            
            <Topbar />

            <EmergencyBanner />

            <main class="flex-grow z-10">
              {activeTab === 'health' && <VehicleHealthPage />}
              {activeTab === 'twin' && <DigitalTwinPage />}
              {activeTab === 'planner' && <MaintenancePlannerPage />}
              {activeTab === 'mechanic' && <AIMechanicPage />}
              {activeTab === 'settings' && <SettingsPage />}
            </main>
          </div>
        </div>
      );
    };

    // --- Root Render ---
    const App = () => {
      return (
        <SimulationProvider>
          <MainLayout />
        </SimulationProvider>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
